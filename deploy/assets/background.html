<!-- JavaScript -->
  
<script>

const WATER_LINE = 560;


/*---------------------------------------------------------------------------------------------------------------------------------------------------------------*/
const fishConfigs = [
  { id:"fish1", x0:200, vx:1.8, power:45, delay:0,   interval:180 },
  { id:"fish2", x0:500, vx:1.6, power:50, delay:60,  interval:220 },
  { id:"fish3", x0:900, vx:2.0, power:42, delay:120, interval:260 }
];
/*---------------------------------------------------------------------------------------------------------------------------------------------------------------*/

const fishes = fishConfigs.map(cfg => ({
  el: document.getElementById(cfg.id),
  cfg,
  t: 0,
  cooldown: cfg.delay,
  color: randomColor()
}));

function randomColor() {
  const colors = [
    "#ff5e62", "#ff9966", "#ffd166",
    "#06d6a0", "#4cc9f0", "#b5179e",
    "#f72585", "#fca311"
  ];
  return colors[Math.floor(Math.random() * colors.length)];
}

/* apply fish colors */
fishes.forEach(f => {
  const body = f.el.querySelector(".fishBody");
  const tail = f.el.querySelector(".fishTail");

  body.setAttribute("fill", f.color);
  tail.setAttribute("fill", f.color);
});

/* physics step */
function step(f) {

  if (f.cooldown > 0) {
    f.cooldown--;
    return;
  }

  f.t += 0.05;
  const t = f.t;

  const x = f.cfg.x0 + f.cfg.vx * t * 30;

  const y =
    WATER_LINE -
    (f.cfg.power * t - 0.5 * 9.8 * t * t);

  if (y < WATER_LINE) {
    f.el.style.opacity = 1;
  }

  f.el.setAttribute(
    "transform",
    `translate(${x},${y}) rotate(${Math.min(t * 10 - 40, 75)}) scale(1.6)`
  );

  if (y >= WATER_LINE || x > 1440) {
    f.t = 0;
    f.cooldown = f.cfg.interval;
    f.cfg.x0 = Math.random() * 500 + 100;
    f.el.style.opacity = 0;
  }
}

/* loop */
function loop() {
  fishes.forEach(step);
  requestAnimationFrame(loop);
}

loop();

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kushagra Bhagat - Portfolio</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

svg {
  width: 100vw;
  height: 100vh;
  background: #000;
}

.fish {
  cursor: pointer;
  pointer-events: all;
}
</style>
</head>

<body>

<svg viewBox="0 0 1440 690" preserveAspectRatio="none">

<defs>

<linearGradient id="gradient" x1="50%" y1="0%" x2="50%" y2="100%">
  <stop offset="0%" stop-color="#2b5876"/>
  <stop offset="100%" stop-color="#4e4376"/>
</linearGradient>

<!-- Fish -->
<g id="fishTemplate">
  <g class="fish" fill="currentColor">
    <path d="M30,0 C20,-12 -10,-12 -25,0 C-10,12 20,12 30,0 Z"/>
    <path d="M-25,0 L-40,-12 L-35,0 L-40,12 Z"/>
  </g>
</g>

</defs>

<!-- Waves -->
<path fill="url(#gradient)" d="M0,600 C200,550 400,650 600,600 C800,550 1000,650 1200,600 C1350,570 1400,580 1440,590 L1440,690 L0,690 Z"/>

</svg>

<script>
document.addEventListener("DOMContentLoaded", () => {

const svg = document.querySelector("svg");

const fishUrls = [
 "https://kuwushagra.github.io/"
  "https://kuwushagra.github.io/projects"
];

const FISH_COUNT = fishUrls.length;
const WATER_LINE = 560;

function randomColor() {
  const colors = ["#ff5e62","#ff9966","#ffd166","#06d6a0","#4cc9f0","#b5179e"];
  return colors[Math.floor(Math.random() * colors.length)];
}

const fishes = [];

for (let i = 0; i < FISH_COUNT; i++) {

  const el = document.getElementById("fishTemplate").cloneNode(true);
  el.removeAttribute("id");

  const x0 = Math.random() * 1200;

  el.setAttribute("transform", `translate(${x0},560) scale(1.6)`);
  el.style.color = randomColor();

  el.dataset.url = fishUrls[i];

  svg.appendChild(el);

  fishes.push({
    el,
    x0,
    vx: 1 + Math.random() * 2,
    t: 0,
    cooldown: Math.random() * 100,
    power: 40 + Math.random() * 30,
    interval: 120 + Math.random() * 200
  });

  el.addEventListener("click", () => {
    window.open(el.dataset.url, "_blank");
  });
}

function step(f) {

  if (f.cooldown > 0) {
    f.cooldown--;
    return;
  }

  f.t += 0.05;

  const x = f.x0 + f.vx * f.t * 30;
  const y = WATER_LINE - (f.power * f.t - 0.5 * 9.8 * f.t * f.t);

  f.el.setAttribute(
    "transform",
    `translate(${x},${y}) rotate(${Math.min(f.t * 10 - 40, 75)}) scale(1.6)`
  );

  if (y >= WATER_LINE || x > 1440) {
    f.t = 0;
    f.cooldown = f.interval;
    f.x0 = Math.random() * 1200;
  }
}

function loop() {
  fishes.forEach(step);
  requestAnimationFrame(loop);
}

loop();

});
</script>

</body>
</html>

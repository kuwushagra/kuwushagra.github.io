<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kushagra Bhagat - Portfolio</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background-image: url('https://i.pinimg.com/736x/f5/a4/4b/f5a44ba6c12da8b02e648864de746e2d.jpg');
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

svg {
  width: 100vw;
  height: 100vh;
  display: block;
}

.fish {
  cursor: pointer;
  pointer-events: all;
  transition: opacity 0.6s ease;
}
</style>
</head>

<body>

<svg style="position: fixed; top: 0; left: 0; width: 100vw; display: block; height: 100vh; z-index: -1;"
id="svg" viewBox="0 0 1440 690" preserveAspectRatio="none"
xmlns="http://www.w3.org/2000/svg">

<style>
.path-0 {
  animation: pathAnim-0 4s linear infinite;
}

@keyframes pathAnim-0 {
  0%   { d: path("M 0,690 L 0,550 C 100,530 200,500 350,520 C 500,540 600,580 750,560 C 900,540 1050,480 1200,500 C 1300,520 1380,550 1440,570 L 1440,690 L 0,690 Z"); }
  25%  { d: path("M 0,690 L 0,530 C 120,550 220,560 320,540 C 450,510 580,480 700,500 C 850,520 980,570 1120,550 C 1230,530 1340,550 1440,570 L 1440,690 L 0,690 Z"); }
  50%  { d: path("M 0,690 L 0,560 C 80,540 180,510 300,530 C 420,550 550,580 680,560 C 820,530 950,490 1100,510 C 1220,530 1320,560 1440,570 L 1440,690 L 0,690 Z"); }
  75%  { d: path("M 0,690 L 0,540 C 140,520 250,540 360,560 C 480,580 600,530 720,510 C 880,490 1020,540 1150,560 C 1250,580 1350,560 1440,570 L 1440,690 L 0,690 Z"); }
  100% { d: path("M 0,690 L 0,550 C 100,530 200,500 350,520 C 500,540 600,580 750,560 C 900,540 1050,480 1200,500 C 1300,520 1380,550 1440,570 L 1440,690 L 0,690 Z"); }
}

.path-1 {
  animation: pathAnim-1 4s linear infinite;
}

@keyframes pathAnim-1 {
  0%   { d: path("M 0,690 L 0,600 C 100,580 220,550 330,570 C 450,600 550,650 680,630 C 800,610 920,550 1050,580 C 1180,610 1300,640 1440,630 L 1440,690 L 0,690 Z"); }
  25%  { d: path("M 0,690 L 0,580 C 150,600 250,620 350,600 C 480,570 600,540 720,560 C 850,580 980,630 1100,610 C 1220,590 1320,610 1440,630 L 1440,690 L 0,690 Z"); }
  50%  { d: path("M 0,690 L 0,610 C 120,630 220,600 320,580 C 450,550 580,590 700,610 C 830,630 950,650 1080,620 C 1200,590 1310,610 1440,630 L 1440,690 L 0,690 Z"); }
  75%  { d: path("M 0,690 L 0,590 C 90,560 190,540 300,560 C 420,580 520,620 650,640 C 780,660 900,610 1020,590 C 1150,570 1280,600 1440,630 L 1440,690 L 0,690 Z"); }
  100% { d: path("M 0,690 L 0,600 C 100,580 220,550 330,570 C 450,600 550,650 680,630 C 800,610 920,550 1050,580 C 1180,610 1300,640 1440,630 L 1440,690 L 0,690 Z"); }
}
</style>

<defs>

<linearGradient id="gradient" x1="56%" y1="0%" x2="44%" y2="100%">
  <stop offset="0%" stop-color="#00f5d4"/>
  <stop offset="50%" stop-color="#00b4d8"/>
  <stop offset="100%" stop-color="#0077b6"/>
</linearGradient>

<g id="fishTemplate">
  <g class="fish" fill="currentColor">
    <path d="M30,0 C20,-12 -10,-12 -25,0 C-10,12 20,12 30,0 Z"/>
    <path d="M-25,0 L-40,-12 L-35,0 L-40,12 Z"/>
  </g>
</g>

</defs>

<path fill="url(#gradient)" fill-opacity="0.53"
d="M 0,690 L 0,550 C 100,530 200,500 350,520 C 500,540 600,580 750,560 C 900,540 1050,480 1200,500 C 1300,520 1380,550 1440,570 L 1440,690 L 0,690 Z"
class="path-0"/>

<path fill="url(#gradient)" fill-opacity="1"
d="M 0,690 L 0,600 C 100,580 220,550 330,570 C 450,600 550,650 680,630 C 800,610 920,550 1050,580 C 1180,610 1300,640 1440,630 L 1440,690 L 0,690 Z"
class="path-1"/>

</svg>

<script>
document.addEventListener("DOMContentLoaded", () => {

const svg = document.getElementById("svg");

const fishUrls = [
 "https://kuwushagra.github.io/",
 "https://kuwushagra.github.io/projects"
];

const MAX_ACTIVE = 3;
const WATER_LINE = 560;

function fishColor() {
  return ["#ffd166","#ff7b00","#ff4d6d","#f1faee","#90e0ef","#00f5d4","#00b4d8","#0077b6","#a7c957","#f77f00"][Math.floor(Math.random()*10)];
}

const fishes = [];

for (let i = 0; i < fishUrls.length; i++) {

  const el = document.getElementById("fishTemplate").cloneNode(true);
  el.removeAttribute("id");

  el.style.color = fishColor();
  el.style.opacity = 0;

  svg.appendChild(el);

  fishes.push({
    el,
    url: fishUrls[i],
    active: false,
    alpha: 0,
    x0: Math.random() * 1200,
    vx: 1 + Math.random() * 2,
    t: 0,
    cooldown: Math.random() * 100,
    power: 40 + Math.random() * 30,
    interval: 120 + Math.random() * 200
  });

  el.addEventListener("click", () => {
    window.open(fishUrls[i], "_blank");
  });
}

function activeCount() {
  return fishes.filter(f => f.active).length;
}

function step(f) {

  if (!f.active) {
    f.cooldown--;
    if (f.cooldown <= 0 && activeCount() < MAX_ACTIVE) {
      f.active = true;
      f.t = 0;
      f.x0 = Math.random() * 1200;
    }
    return;
  }

  f.t += 0.05;

  const x = f.x0 + f.vx * f.t * 12;
  const y = WATER_LINE - (f.power * f.t - 0.5 * 9.8 * f.t * f.t);

  if (f.alpha < 1 && f.t < 1) f.alpha += 0.05;
  if (x > 1300 || y > WATER_LINE + 50) f.alpha -= 0.08;

  f.alpha = Math.max(0, Math.min(1, f.alpha));
  f.el.style.opacity = f.alpha;

  const rot = Math.min(f.t * 10 - 40, 75);

  f.el.setAttribute(
    "transform",
    `translate(${x},${y}) rotate(${rot}) scale(1.6)`
  );

  if (f.alpha <= 0) {
    f.active = false;
    f.cooldown = f.interval;
    f.t = 0;
    f.x0 = Math.random() * 1200;
  }
}

function loop() {
  fishes.forEach(step);
  requestAnimationFrame(loop);
}

loop();

});
</script>

</body>
</html>

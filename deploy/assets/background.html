<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kushagra Bhagat - Portfolio</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

.fish {
  cursor: pointer;
  opacity: 1;

<body>

<svg style="background-color:#000;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:-1;"
viewBox="0 0 1440 690"
preserveAspectRatio="none"
xmlns="http://www.w3.org/2000/svg">

<style>
.path-0 {
  animation: pathAnim0 4s linear infinite;
}

@keyframes pathAnim0 {
  0%   { d: path("M 0,690 L 0,550 C 100,530 200,500 350,520 C 500,540 600,580 750,560 C 900,540 1050,480 1200,500 C 1300,520 1380,550 1440,570 L 1440,690 L 0,690 Z"); }
  25%  { d: path("M 0,690 L 0,530 C 120,550 220,560 320,540 C 450,510 580,480 700,500 C 850,520 980,570 1120,550 C 1230,530 1340,550 1440,570 L 1440,690 L 0,690 Z"); }
  50%  { d: path("M 0,690 L 0,560 C 80,540 180,510 300,530 C 420,550 550,580 680,560 C 820,530 950,490 1100,510 C 1220,530 1320,560 1440,570 L 1440,690 L 0,690 Z"); }
  75%  { d: path("M 0,690 L 0,540 C 140,520 250,540 360,560 C 480,580 600,530 720,510 C 880,490 1020,540 1150,560 C 1250,580 1350,560 1440,570 L 1440,690 L 0,690 Z"); }
  100% { d: path("M 0,690 L 0,550 C 100,530 200,500 350,520 C 500,540 600,580 750,560 C 900,540 1050,480 1200,500 C 1300,520 1380,550 1440,570 L 1440,690 L 0,690 Z"); }
}

.path-1 {
  animation: pathAnim1 4s linear infinite;
}

@keyframes pathAnim1 {
  0%   { d: path("M 0,690 L 0,600 C 100,580 220,550 330,570 C 450,600 550,650 680,630 C 800,610 920,550 1050,580 C 1180,610 1300,640 1440,630 L 1440,690 L 0,690 Z"); }
  25%  { d: path("M 0,690 L 0,580 C 150,600 250,620 350,600 C 480,570 600,540 720,560 C 850,580 980,630 1100,610 C 1220,590 1320,610 1440,630 L 1440,690 L 0,690 Z"); }
  50%  { d: path("M 0,690 L 0,610 C 120,630 220,600 320,580 C 450,550 580,590 700,610 C 830,630 950,650 1080,620 C 1200,590 1310,610 1440,630 L 1440,690 L 0,690 Z"); }
  75%  { d: path("M 0,690 L 0,590 C 90,560 190,540 300,560 C 420,580 520,620 650,640 C 780,660 900,610 1020,590 C 1150,570 1280,600 1440,630 L 1440,690 L 0,690 Z"); }
  100% { d: path("M 0,690 L 0,600 C 100,580 220,550 330,570 C 450,600 550,650 680,630 C 800,610 920,550 1050,580 C 1180,610 1300,640 1440,630 L 1440,690 L 0,690 Z"); }
}
</style>

<defs>

<linearGradient id="gradient" x1="56%" y1="0%" x2="44%" y2="100%">
  <stop offset="5%" stop-color="#854442"/>
  <stop offset="95%" stop-color="#3c2f2f"/>
</linearGradient>

<g id="fishShape" fill="currentColor">
  <path d="M30,0 C20,-12 -10,-12 -25,0 C-10,12 20,12 30,0 Z"/>
  <path d="M-25,0 L-40,-12 L-35,0 L-40,12 Z"/>
  <circle cx="15" cy="-3" r="2" fill="#fff"/>
  <circle cx="15" cy="-3" r="1" fill="#000"/>
</g>

</defs>

<!-- WAVES -->
<path fill="url(#gradient)" fill-opacity="0.53"
d="M 0,690 L 0,550 C 100,530 200,500 350,520 C 500,540 600,580 750,560 C 900,540 1050,480 1200,500 C 1300,520 1380,550 1440,570 L 1440,690 L 0,690 Z"
class="path-0"/>

<path fill="url(#gradient)" fill-opacity="1"
d="M 0,690 L 0,600 C 100,580 220,550 330,570 C 450,600 550,650 680,630 C 800,610 920,550 1050,580 C 1180,610 1300,640 1440,630 L 1440,690 L 0,690 Z"
class="path-1"/>

<!------------------------------------- FISH ------------------------------------->
<use href="https://kuwushagra.github.io/" id="fish1" class="fish"/>
<use href="https://kuwushagra.github.io/projects.html" id="fish2" class="fish"/>

</svg>

<script>
document.addEventListener("DOMContentLoaded", () => {

const WATER_LINE = 570;

const fishConfigs = [
  { id:"fish1", x0:200, vx:1.8, power:45, delay:0,   interval:180 },
  { id:"fish2", x0:500, vx:1.6, power:50, delay:60,  interval:220 },
];
/*--------------------------------------------------------------------------*/
  
function randomColor() {
  const colors = ["#ff5e62","#ff9966","#ffd166","#06d6a0","#4cc9f0","#b5179e"];
  return colors[Math.floor(Math.random() * colors.length)];
}

const fishes = fishConfigs.map(cfg => {
  const el = document.getElementById(cfg.id);

  const c = randomColor();
  el.style.color = c;

  el.setAttribute("transform", `translate(${cfg.x0},560) scale(1.6)`);

  return {
    el,
    cfg,
    t: 0,
    cooldown: cfg.delay
  };
});

function step(f) {

  if (f.cooldown > 0) {
    f.cooldown--;
    return;
  }

  f.t += 0.05;

  const x = f.cfg.x0 + f.cfg.vx * f.t * 30;

  const y =
    WATER_LINE -
    (f.cfg.power * f.t - 0.5 * 9.8 * f.t * f.t);

  f.el.style.opacity = 1;

  f.el.setAttribute(
    "transform",
    `translate(${x},${y}) rotate(${Math.min(f.t * 10 - 40, 75)}) scale(1.6)`
  );

  if (y >= WATER_LINE || x > 1440) {
    f.t = 0;
    f.cooldown = f.cfg.interval;
    f.cfg.x0 = Math.random() * 500 + 100;
    f.el.style.opacity = 0;
  }
}

function loop() {
  fishes.forEach(step);
  requestAnimationFrame(loop);
}

loop();

});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Physics Fish Ocean</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* waves still CSS animated */
.path-0 {
  animation: wave1 4s linear infinite;
}

.path-1 {
  animation: wave2 4s linear infinite;
}

@keyframes wave1 {
  0%,100% {
    d:path("M 0,900 L 0,750 C 100,730 200,700 350,720 C 500,740 600,780 750,760 C 900,740 1050,680 1200,700 C 1300,720 1380,750 1440,770 L 1440,900 L 0,900 Z");
  }
  50% {
    d:path("M 0,900 L 0,760 C 120,740 220,760 340,740 C 480,710 600,700 740,720 C 880,740 1020,780 1140,760 C 1260,740 1340,760 1440,770 L 1440,900 L 0,900 Z");
  }
}

@keyframes wave2 {
  0%,100% {
    d:path("M 0,900 L 0,800 C 100,780 220,750 330,770 C 450,800 550,850 680,830 C 800,810 920,750 1050,780 C 1180,810 1300,840 1440,830 L 1440,900 L 0,900 Z");
  }
  50% {
    d:path("M 0,900 L 0,790 C 120,820 240,800 360,780 C 500,760 620,780 740,800 C 860,820 980,840 1100,820 C 1220,800 1320,810 1440,830 L 1440,900 L 0,900 Z");
  }
}

/* fish */
.fish {
  transform-origin: center;
  opacity: 0;
  pointer-events: auto;
  cursor: pointer;
}

</style>
</head>

<body>

<svg viewBox="0 0 1440 900" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="water" x1="0" x2="0" y1="0" y2="1">
  <stop offset="0%" stop-color="#854442"/>
  <stop offset="100%" stop-color="#3c2f2f"/>
</linearGradient>

<linearGradient id="fishGrad" x1="0%" x2="100%" y1="0%" y2="100%">
  <stop offset="0%" stop-color="#FF7E5F"/>
  <stop offset="100%" stop-color="#FEB47B"/>
</linearGradient>

<g id="fishShape">
  <path d="M25,0 C10,-12 -15,-10 -25,0 C-15,10 10,12 25,0 Z" fill="url(#fishGrad)"/>
  <path d="M-22,0 L-32,-9 L-28,0 L-32,9 Z" fill="url(#fishGrad)"/>
</g>

</defs>

<!-- waves -->
<path class="path-0" fill="url(#water)" opacity="0.5"
d="M 0,900 L 0,750 C 100,730 200,700 350,720 C 500,740 600,780 750,760 C 900,740 1050,680 1200,700 C 1300,720 1380,750 1440,770 L 1440,900 L 0,900 Z"/>

<path class="path-1" fill="url(#water)" opacity="1"
d="M 0,900 L 0,800 C 100,780 220,750 330,770 C 450,800 550,850 680,830 C 800,810 920,750 1050,780 C 1180,810 1300,840 1440,830 L 1440,900 L 0,900 Z"/>

<!-- fish -->
<use href="#fishShape" class="fish" id="fish1"/>
<use href="#fishShape" class="fish" id="fish2"/>

</svg>

<script>
const WATER_Y = 880;

const fishes = [
  {
    el: document.getElementById("fish1"),
    x0: 200,
    y0: WATER_Y,
    vx: 2.4,
    vy: 8.5,
    g: 0.28,
    t: 0,
    delay: 0,
    scale: 2
  },
  {
    el: document.getElementById("fish2"),
    x0: 800,
    y0: WATER_Y,
    vx: 2.0,
    vy: 9.0,
    g: 0.30,
    t: 0,
    delay: 60,
    scale: 1.7
  }
];

function stepFish(f) {

  if (f.delay > 0) {
    f.delay--;
    return;
  }

  f.t += 0.016 * 60; // normalized time

  const t = f.t;

  // physics equations
  const x = f.x0 + f.vx * t * 6;

  const y =
    f.y0 -
    (f.vy * t * 6 - 0.5 * f.g * (t * t) * 20);

  // show only when above water line
  if (y < WATER_Y - 5) {
    f.el.style.opacity = 1;
  }

  let rot = -60 + t * 10;
  if (rot > 85) rot = 85;

  f.el.setAttribute(
    "transform",
    `translate(${x},${y}) rotate(${rot}) scale(${f.scale})`
  );

  // reset when hitting water again
  if (y >= WATER_Y) {
    f.el.style.opacity = 0;
    f.t = 0;
    f.delay = 60 + Math.random() * 100;
  }
}

function animate() {
  fishes.forEach(stepFish);
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>

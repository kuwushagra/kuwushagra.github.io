<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap');
  
html, body {
  height: 100%;
  margin: 0;
  background: black;
  overflow-x: hidden;
  font-family: "Source Code Pro", monospace;
  color: white;
}

body {
  margin: 0;
  display: flex;
  flex-direction: column;
}
  
footer {
  margin-top: auto;
}

.myname {
font-family: "Bitcount Single", system-ui;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
  font-variation-settings:
    "slnt" 0,
    "CRSV" 0.5,
    "ELSH" 0,
    "ELXP" 0;
}
  
a { color: #bdc3c7; text-decoration: none; }
a:hover { color: #ffffff; text-shadow: 0 0 1px rgba(255, 255, 255, 0.8); }

#bgSvg {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  pointer-events: none;
}

#fishSvg {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 5;
  pointer-events: none;
}

.fish {
  pointer-events: all;
  cursor: pointer;
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.35));
}

header, main, footer {
  position: relative;
  z-index: 10;
}
</style>
</head>

<body>

<svg id="bgSvg" viewBox="0 0 1440 690" preserveAspectRatio="none"
xmlns="http://www.w3.org/2000/svg">

<defs>
<linearGradient id="gradient">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
  <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
</linearGradient>
</defs>

<path fill="url(#gradient)" fill-opacity="0.25"
d="M0,550 C300,500 600,600 900,520 C1200,450 1440,600 1440,600 L1440,690 L0,690 Z"/>

<path fill="url(#gradient)" fill-opacity="0.15"
d="M0,600 C200,650 400,550 600,600 C800,650 1000,520 1440,600 L1440,690 L0,690 Z"/>

</svg>

<svg id="fishSvg" viewBox="0 0 1440 690" preserveAspectRatio="none"
xmlns="http://www.w3.org/2000/svg">

<defs>
<g id="fishTemplate">
  <g class="fish" fill="none" stroke-width="1.5">
    <path d="M30,0 C20,-12 -10,-12 -25,0 C-10,12 20,12 30,0 Z"/>
    <path d="M-25,0 L-40,-12 L-35,0 L-40,12 Z"/>
  </g>
</g>
</defs>

</svg>

<header>
  <link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.8.0/styles/webawesome.css" />
  <script type="module" src="https://ka-f.webawesome.com/webawesome@3.8.0/webawesome.loader.js"></script>
  <div style="display: flex; background: rgba(128, 128, 128, 0.2); border-radius: 12px; padding: 16px;">
    <div style="display: inline-block; margin-top: auto; margin-right: auto;"><h1 style="font-size: 1.1em" class="myname">Kushagra Bhagat</h1></div>
  <div><div style="display: inline-block; margin-top: auto;  margin-left: auto">
  <p> <a href="https://kuwushagra.github.io/">Home</a> | <a href="https://kuwushagra.github.io/about">About</a> | <a href="https://kuwushagra.github.io/projects">Projects  </a></div>
  <div style="display: inline-block; margin-top: auto; margin-left: auto" class="links">
      <a href="mailto:kushagrabhagat.work@gmail.com"><wa-icon name="envelope" variant="regular" style="color: salmon; font-size: 1.1em"></wa-icon></a>
      <a href="https://github.com/kuwushagra"><wa-icon name="github-alt" family="brands" style="color: steelblue; font-size: 1.1em"></wa-icon></a>
  </div></div></div></p>
  </br>
</header>

<main>
  <div style="max-width:650px; margin:40px auto;">
    {{ content }}
  </div>
</main>

<div style="margin-top: auto">
  <footer style="background: rgba(128, 128, 128, 0.2); border-radius: 12px; padding: 16px;">
    <div style="text-align: center"> <p> &copy; {{ "now" | date: "%Y" }} Kushagra Bhagat. All rights reserved </p> </div>
  </footer>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const svg = document.getElementById("fishSvg");

const fishUrls = [
 "https://kuwushagra.github.io",
 "https://kuwushagra.github.io/projects"
];

const colors = ["#3a86ff", "#8338ec", "#ff006e", "#06d6a0", "#ffd166"];

const MAX_ACTIVE = 3;
const WATER_LINE = 560;

const fishes = [];

function fishColor() {
  return colors[Math.floor(Math.random() * colors.length)];
}

function activeCount() {
  return fishes.filter(f => f.active).length;
}

for (let i = 0; i < fishUrls.length; i++) {

  const template = document.getElementById("fishTemplate");
  const el = template.cloneNode(true);
  el.removeAttribute("id");

  el.querySelector(".fish").setAttribute("stroke", fishColor());

  svg.appendChild(el);

  const fishShape = el.querySelector(".fish");

  fishShape.addEventListener("click", () => {
    window.location.href = fishUrls[i];
  });

  fishes.push({
    el,
    url: fishUrls[i],
    active: false,
    alpha: 0,
    x0: Math.random() * 1200,
    vx: 1 + Math.random() * 2,
    t: 0,
    cooldown: Math.random() * 100,
    power: 40 + Math.random() * 30,
    interval: 120 + Math.random() * 200
  });
}

function step(f) {

  if (!f.active) {
    f.cooldown--;
    if (f.cooldown <= 0 && activeCount() < MAX_ACTIVE) {
      f.active = true;
      f.t = 0;
      f.x0 = Math.random() * 1200;
    }
    return;
  }

  f.t += 0.05;

  const x = f.x0 + f.vx * f.t * 12;
  const y = WATER_LINE - (f.power * f.t - 0.5 * 9.8 * f.t * f.t);

  if (f.alpha < 1 && f.t < 1) f.alpha += 0.05;
  if (x > 1300 || y > WATER_LINE + 50) f.alpha -= 0.08;

  f.alpha = Math.max(0, Math.min(1, f.alpha));
  f.el.style.opacity = f.alpha;

  const rot = Math.min(f.t * 10 - 40, 75);

  f.el.setAttribute(
    "transform",
    `translate(${x},${y}) rotate(${rot}) scale(1.6)`
  );

  if (f.alpha <= 0) {
    f.active = false;
    f.cooldown = f.interval;
    f.t = 0;
    f.x0 = Math.random() * 1200;
  }
}

function loop() {
  fishes.forEach(step);
  requestAnimationFrame(loop);
}

loop();

});
</script>

</body>
</html>

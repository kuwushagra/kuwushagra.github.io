---
layout: default
---

<style>
 /* button */
    .glowing-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: rgba(255, 255, 255, 0.15); 
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2), 
                  inset 0 0 10px rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease-in-out;
    }    
</style>

  <div style="width: 100%; margin: 0 auto; justify-content: center; align-items: center">
    <div class="glowing-btn" style="margin: 0 auto; justify-content: center; align-items: center; width: 100%;">
      <a href="/">Home</a> > <a href="/projects/">Projects</a> > {{ page.projectname }}
    </div><br><br>
    
    <div class="glowing-btn" style="display: block; width: 100%;">
      <div style="display: flex"><div style="margin-top: auto"><h1>{{ page.projectname }}</h1></div><div style="margin-top: auto; margin-bottom: auto;"><a href="{{ page.projectlink }}"><wa-icon name="github" family="brands" style="font-size: 1.1em"></wa-icon></a></div></div>
      <hr>
      <img src="{{ page.projectimage }}"><br>
      <div style="text-align: center">{{ page.description }}</div>
    </div>
  </div>

  {{ content }}

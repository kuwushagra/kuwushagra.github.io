---
layout: default
---

  <style>
  @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Ranchers&display=swap');
    .hero h1 {
        font-family: "Audiowide", sans-serif;
        font-weight: 400;
        font-style: normal;
        font-size: 3.0rem;
        text-align: center;
        width: 100%; 
        margin: 0 auto;
    }

    .typing-text {
      color: #38bdf8;
      font-weight: bold;
      font-style: normal;
    }

    .cursor {
      display: inline-block;
      margin-left: 2px;
      color: #38bdf8;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* button */
    .glowing-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: rgba(255, 255, 255, 0.15); 
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2), 
                  inset 0 0 10px rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease-in-out;
    }
  
    .glowing-btn wa-icon {
      font-size: 18px;
      transition: transform 0.3s ease;
    }
  
    .glowing-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.5), 
                  0 0 10px rgba(255, 255, 255, 0.3),
                  inset 0 0 15px rgba(255, 255, 255, 0.2);
      transform: translateY(-2px); 
    }
  
    .glowing-btn:hover i {
      transform: translateX(-3px);
    }
  
    .glowing-btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
    }
    
  </style>
</head>

<body>

  <div class="hero" sytle="text-align: center">
    <h1> Hello, I'm {{ page.yourname }}</h1>
    <h1 >I am a </h1> 
    <h1><span class="typing-text"></span><span class="cursor">|</span></h1>
    <p style="font-size: 0.75em; margin: 0 auto;"><br><br>{{ page. submessage }}</p>
  </div>

  <div sytle="width: 100%; margin: 0 auto;">
    <a href="{{ page.buttonlink }}" class="glowing-btn">
      <wa-icon name="angle-right" family="brands"></wa-icon>
      <span>{{ page.buttontext }}</span> 
    </a>
  </div>
  
  <script>
    const words = ["Developer", "Designer", "Freelancer"];

    let i = 0;
    let j = 0;
    let isDeleting = false;

    function typeEffect() {
      const display = document.querySelector(".typing-text");

      let currentWord = words[i];

      if (!isDeleting) {
        display.textContent = currentWord.substring(0, j + 1);
        j++;

        if (j === currentWord.length) {
          isDeleting = true;
          setTimeout(typeEffect, 1000);
          return;
        }
      } else {
        display.textContent = currentWord.substring(0, j - 1);
        j--;

        if (j === 0) {
          isDeleting = false;
          i = (i + 1) % words.length;
        }
      }

      setTimeout(typeEffect, isDeleting ? 80 : 120);
    }

    document.addEventListener("DOMContentLoaded", typeEffect);
  </script>

</body>
</html>

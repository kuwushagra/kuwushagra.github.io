---
layout: default
title: Home
---

  <style>

    .hero h1 {
      font-size: 4.0rem;
    }

    .typing-text {
      color: #38bdf8;
      font-weight: bold;
    }

    .cursor {
      display: inline-block;
      margin-left: 2px;
      color: #38bdf8;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="hero" sytle="text-align: center">
    <h1> Hello, I am Kushagra.<h1>
    <h1>
      I am a <span class="typing-text"></span><span class="cursor">|</span>
    </h1>
    <p>*Click the fishes to visit project pages, or just use the Navbar above :)</p>
  </div>

  <script>
    const words = ["Programmer", "Designer", "Freelancer"];

    let i = 0;
    let j = 0;
    let isDeleting = false;

    function typeEffect() {
      const display = document.querySelector(".typing-text");

      let currentWord = words[i];

      if (!isDeleting) {
        display.textContent = currentWord.substring(0, j + 1);
        j++;

        if (j === currentWord.length) {
          isDeleting = true;
          setTimeout(typeEffect, 1000);
          return;
        }
      } else {
        display.textContent = currentWord.substring(0, j - 1);
        j--;

        if (j === 0) {
          isDeleting = false;
          i = (i + 1) % words.length;
        }
      }

      setTimeout(typeEffect, isDeleting ? 80 : 120);
    }

    document.addEventListener("DOMContentLoaded", typeEffect);
  </script>

</body>
</html>

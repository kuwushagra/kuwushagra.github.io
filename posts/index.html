---
layout: default
title: Posts | Kushagra's Corner
---
  
<h1>Blog Posts</h1><br>

  <div style="display: flex; width: 100%; margin: 0 auto; justify-content: center; align-items: center;">
    <a href="/posts" class="glowing-btn" style="pointer-events: none; margin: 0 auto; justify-content: center; align-items: center;">
      <span>All</span> 
    </a>

    <a href="/posts/tags" class="glowing-btn" style="margin: 0 auto; justify-content: center; align-items: center;">
      <span>Tags</span> 
    </a>

    <a href="/posts/categories" class="glowing-btn" style="margin: 0 auto; justify-content: center; align-items: center;">
      <span>Categories</span> 
    </a>
  </div><br>

<ul class="post-list" style="list-style-type: none; padding-left: 0; margin: 0">
  {% for post in site.posts %}
    <li style="padding-left: 0; margin: 0">
      <a href="{{ post.url | relative_url }}" class="glowing-btn" style="display: block; width: 100%; padding: 25px; border-radius: 15px;">
        <h3>{{ post.title }}</h3>
        <p>{{ post.excerpt | strip_html | truncatewords: 10 }}</p>
        <span class="post-date">{{ post.date | date: "%b %d, %Y" }}</span>
      </a>
    </li><br>
  {% endfor %}
</ul>
